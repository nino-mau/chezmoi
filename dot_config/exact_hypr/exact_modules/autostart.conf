# Launch notification daemon
exec-once = mako

# Launch hyprpanel
exec-once = hyprpanel

# Launch swww daemon
exec-once = swww-daemon

# Launch walker service
exec-once = walker --gapplication-service

# Set clipboard manager
exec-once = wl-paste --type text --watch cliphist store 

exec-once = $terminal

# Launch terminal in special term workspace
exec-once = [workspace special:term silent] $terminal -e "opencode"

# Launch opencode in special term workspace
exec-once = [workspace special:term silent] $terminal

# Launch btop in special btop workspace
exec-once = [workspace special:btop silent] $terminal -e "btop"
