$terminal = ghostty
$browser = zen-browser
$fileManager = nautilus
$hypremoji = hypremoji
$lockscreen = hyprlock

# Vicinae menus
$vicinae = vicinae toggle
$clipboard_menu = vicinae 'vicinae://launch/clipboard/history'
$emoji_menu = vicinae 'vicinae://launch/core/search-emojis'

# Walker menus
$menu = nc -U /run/user/1000/walker/walker.sock
# $clipboard_menu = walker --provider clipboard
# $emoji_menu = walker --provider symbols
$providers_menu = walker --provider providerlist
$actions_menu = walker --provider menus:actions
$wallpapers_menu = ~/.local/bin/walker-theme-wallpapers
