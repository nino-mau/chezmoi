session_name: firefox-bookmark-manager
start_directory: $HOME/Code/projects/firefox-bookmark-manager/
windows:
  - window_name: editor
    panes:
      - shell_command:
          - nvim

  - window_name: cmd
    layout: main-vertical
    options:
      main-pane-width: "50%"
    panes:
      - clear
      - clear

  - window_name: ai
    panes:
      - pi --continue

  - window_name: lazygit
    panes:
      - lazygit

  - window_name: processes
    layout: main-horizontal
    panes:
      - shell_command:
          - bun run dev:firefox
