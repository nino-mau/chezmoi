session_name: fil-rouge-2026
start_directory: /home/nino/Documents/dev/projects/fil-rouge-2026/
windows:
  - window_name: frontend
    panes:
      - shell_command:
          - cd ./frontend && nvim .

  - window_name: frontend-cmd
    panes:
      - shell_command:
          - cd frontend
      - shell_command:
          - tmux resize-pane -t "$TMUX_PANE" -y 20
          - sleep 2
          - while not docker compose ps --status running --services 2>/dev/null | grep -qx frontend; sleep 1; end; docker compose logs -f frontend

  - window_name: backend
    panes:
      - shell_command:
          - cd ./backend && svenv && nvim .

  - window_name: backend-cmd
    panes:
      - shell_command:
          - cd ./backend && svenv
      - shell_command:
          - tmux resize-pane -t "$TMUX_PANE" -y 20
          - sleep 2
          - while true; while not docker compose ps --status running --services 2>/dev/null | grep -qx backend; sleep 1; end; docker compose logs -f --tail=50 backend; sleep 1; end

  - window_name: cmd
    panes:
      - docker compose down && docker compose up -d --build

  - window_name: opencode
    panes:
      - opencode --continue
