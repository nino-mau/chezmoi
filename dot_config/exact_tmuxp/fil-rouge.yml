session_name: fil-rouge-2026
start_directory: $HOME/Code/projects/fil-rouge-2026/
windows:
  - window_name: frontend
    panes:
      - shell_command:
          - cd ./frontend && nvim .

  - window_name: backend
    panes:
      - shell_command:
          - cd ./backend && svenv && nvim .

  - window_name: cmd
    layout: tiled
    panes:
      - shell_command:
          - cd frontend
          - clear
      - shell_command:
          - restart-on-exit -- fish -c 'while not docker compose ps --status running --services 2>/dev/null | grep -qx frontend; sleep 1; end; docker compose logs -f frontend'
      - shell_command:
          - cd ./backend && svenv
          - clear
      - shell_command:
          - restart-on-exit -- fish -c 'while not docker compose ps --status running --services 2>/dev/null | grep -qx backend; sleep 1; end; docker compose logs -f --tail=50 backend'

  - window_name: cmd-root
    panes:
      - docker compose up -d --build

  - window_name: opencode
    panes:
      - opencode --continue

  - window_name: lazydocker
    panes:
      - lazydocker

  - window_name: lazygit
    panes:
      - lazygit
